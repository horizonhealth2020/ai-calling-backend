version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ops_secret}
      POSTGRES_DB: ${POSTGRES_DB:-ops_prod}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ops}"]
      interval: 3s
      timeout: 3s
      retries: 10

  ops-api:
    build:
      context: .
      dockerfile: apps/ops-api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ops}:${POSTGRES_PASSWORD:-ops_secret}@postgres:5432/${POSTGRES_DB:-ops_prod}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      PORT: "8080"
      NODE_ENV: production
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3011,http://localhost:3013}
    ports:
      - "8080:8080"

  ops-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.nextjs
      args:
        APP_NAME: ops-dashboard
        NEXT_PUBLIC_OPS_API_URL: ${OPS_API_URL:-http://localhost:8080}
    restart: unless-stopped
    depends_on:
      - ops-api
    environment:
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
    ports:
      - "3011:3000"

  sales-board:
    build:
      context: .
      dockerfile: Dockerfile.nextjs
      args:
        APP_NAME: sales-board
        NEXT_PUBLIC_OPS_API_URL: ${OPS_API_URL:-http://localhost:8080}
    restart: unless-stopped
    depends_on:
      - ops-api
    ports:
      - "3013:3000"

volumes:
  pgdata:
